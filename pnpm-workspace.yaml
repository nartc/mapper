# All library + test packages are workspace members so @automapper/* resolves via
# pnpm symlinks + each package's `exports` (source) — no tsconfig `paths` needed.
# The docs projects (documentation/documentations/docs) are deliberately EXCLUDED:
# they keep their own isolated installs so docusaurus's ancient deps don't fan out
# conflicting @nestjs / rxjs / reflect-metadata versions into the workspace.
packages:
    - 'packages/core'
    - 'packages/classes'
    - 'packages/pojos'
    - 'packages/nestjs'
    - 'packages/mikro'
    - 'packages/sequelize'
    - 'packages/integration-test'
    - 'packages/benchmark-core'
    - 'packages/docs'
