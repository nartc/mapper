# Scoped to the packages the benchmark consumes via workspace:* (+ the benchmark
# itself). The other libs and the test/docs projects resolve @automapper/* via
# tsconfig paths for build/test, so they don't need to be workspace members —
# keeping this list small avoids pulling docusaurus's ancient deps (which created
# a fan-out of conflicting @nestjs / rxjs / reflect-metadata versions).
packages:
  - 'packages/core'
  - 'packages/classes'
  - 'packages/pojos'
  - 'packages/benchmark-core'
