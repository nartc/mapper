# All library + test packages are workspace members so @automapper/* resolves via
# pnpm symlinks + each package's `exports` (source) — no tsconfig `paths` needed.
# The legacy documentation projects are deliberately excluded so Docusaurus's
# old dependencies do not fan conflicting versions into the workspace. The
# current Blume project at packages/docs is included below.
packages:
    - 'packages/core'
    - 'packages/classes'
    - 'packages/pojos'
    - 'packages/nestjs'
    - 'packages/mikro'
    - 'packages/sequelize'
    - 'packages/integration-test'
    - 'packages/benchmark-core'
    - 'packages/docs'
