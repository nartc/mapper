# All library, test, and documentation packages are workspace members so
# @automapper/* resolves via pnpm symlinks and each package's `exports` (source)
# without tsconfig `paths`.
packages:
    - 'packages/core'
    - 'packages/classes'
    - 'packages/pojos'
    - 'packages/nestjs'
    - 'packages/mikro'
    - 'packages/sequelize'
    - 'packages/integration-test'
    - 'packages/benchmark-core'
    - 'packages/docs'
